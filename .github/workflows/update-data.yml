name: Update Player Data

on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch player data
        run: |
          mkdir -p data

          for player in "Fiorovizk" "Decxus"; do
            safe=$(echo "$player" | tr '[:upper:]' '[:lower:]')
            echo "Fetching data for $player..."

            # RuneMetrics Profile
            curl -sf --retry 3 --max-time 15 \
              -H "User-Agent: RS3-Leaderboard/1.0" \
              "https://apps.runescape.com/runemetrics/profile/profile?user=${player}&activities=20" \
              -o "data/${safe}_profile.json" || echo "{\"error\":\"fetch_failed\"}" > "data/${safe}_profile.json"

            # Hiscores JSON
            curl -sf --retry 3 --max-time 15 \
              -H "User-Agent: RS3-Leaderboard/1.0" \
              "https://secure.runescape.com/m=hiscore/index_lite.json?player=${player}" \
              -o "data/${safe}_hiscores.json" || echo "{\"error\":\"fetch_failed\"}" > "data/${safe}_hiscores.json"

            # Quests
            curl -sf --retry 3 --max-time 15 \
              -H "User-Agent: RS3-Leaderboard/1.0" \
              "https://apps.runescape.com/runemetrics/quests?user=${player}" \
              -o "data/${safe}_quests.json" || echo "{\"error\":\"fetch_failed\"}" > "data/${safe}_quests.json"

            sleep 1
          done

          # GE Prices for money making
          echo "Fetching GE prices..."
          python3 -c "
import urllib.request, json, sys
items = {52:'Arrow shaft',314:'Feather',53:'Headless arrow',440:'Iron ore',2351:'Iron bar',2353:'Steel bar',453:'Coal',561:'Nature rune',1739:'Cowhide',1743:'Hard leather',1515:'Yew logs',1513:'Magic logs',383:'Raw shark',385:'Shark',1779:'Flax',1777:'Bowstring',2357:'Gold bar',444:'Gold ore'}
prices = {}
for iid, name in items.items():
    try:
        url = f'https://secure.runescape.com/m=itemdb_rs/api/catalogue/detail.json?item={iid}'
        req = urllib.request.Request(url, headers={'User-Agent': 'RS3-Leaderboard/1.0'})
        with urllib.request.urlopen(req, timeout=10) as resp:
            data = json.loads(resp.read())
            ps = str(data['item']['current']['price']).replace(',','')
            if ps.endswith('k'): p=int(float(ps[:-1])*1000)
            elif ps.endswith('m'): p=int(float(ps[:-1])*1000000)
            else: p=int(float(ps))
            prices[str(iid)] = {'name':name,'price':p}
    except Exception as e:
        print(f'Skip {iid}: {e}', file=sys.stderr)
with open('data/ge_prices.json','w') as f:
    json.dump(prices, f)
print(f'Cached {len(prices)} item prices')
"

          # Timestamp
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json

          echo "Done fetching all data"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "Update player data [automated]"
            git push
          fi
