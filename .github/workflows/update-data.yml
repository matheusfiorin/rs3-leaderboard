name: Update Player Data

on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch player data
        run: |
          mkdir -p data

          # Fetch a URL to a temp file. Only overwrite the target when the
          # response passes the jq validator. Preserves the last known-good
          # cache when RuneMetrics returns NOT_A_MEMBER (private profile),
          # the player is unranked on hiscores, or any transient API hiccup.
          fetch_or_keep() {
            local url="$1" target="$2" validator="$3" label="$4"
            local tmp
            tmp="$(mktemp)"
            if curl -sf --retry 3 --max-time 15 \
                 -H "User-Agent: RS3-Leaderboard/1.0" \
                 "$url" -o "$tmp"; then
              if jq -e "$validator" "$tmp" >/dev/null 2>&1; then
                mv "$tmp" "$target"
                echo "  ok  $label -> $target"
              else
                echo "  skip $label (validator failed; preserving previous $target)"
                rm -f "$tmp"
              fi
            else
              echo "  skip $label (fetch failed; preserving previous $target)"
              rm -f "$tmp"
            fi
          }

          # NOTE: Fiorovizk retired 2026-05-21. Memorial section reads frozen
          # data/fiorovizk_*.json (preserved untouched). Soclopata replaces.
          for player in "Decxus" "Soclopata"; do
            safe="$(echo "$player" | tr '[:upper:]' '[:lower:]')"
            echo "Fetching data for $player..."

            fetch_or_keep \
              "https://apps.runescape.com/runemetrics/profile/profile?user=${player}&activities=20" \
              "data/${safe}_profile.json" \
              '(.error == null) and ((.skillvalues // []) | length) > 0' \
              "profile($player)"

            fetch_or_keep \
              "https://secure.runescape.com/m=hiscore/index_lite.json?player=${player}" \
              "data/${safe}_hiscores.json" \
              '((.skills // []) | length) > 0' \
              "hiscores($player)"

            # Accept empty quest arrays only if the response is well-formed
            # (.quests is present and not null). Length>0 used to reject any
            # transient empty payload, which then left quest data permanently
            # stale once the player went private or the API hiccupped.
            fetch_or_keep \
              "https://apps.runescape.com/runemetrics/quests?user=${player}" \
              "data/${safe}_quests.json" \
              '.quests != null and (.error // null) == null' \
              "quests($player)"

            sleep 1
          done

          echo "Fetching GE prices..."
          python3 scripts/fetch_prices.py

          # Always update meta.json so the UI's "last refresh" reflects when
          # the cron actually ran, not just when player data last changed.
          # Both stamps in one file: lastRun = every cron tick;
          # lastChange = only when player data actually changed.
          now="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          last_change="$now"
          if ! git diff --name-only HEAD -- data/ | grep -qv meta.json; then
            # Nothing but meta changed — keep the previous lastChange stamp
            last_change="$(jq -r '.lastChange // .timestamp // empty' data/meta.json 2>/dev/null || true)"
            [ -z "$last_change" ] && last_change="$now"
          fi
          echo "{\"timestamp\":\"$now\",\"lastRun\":\"$now\",\"lastChange\":\"$last_change\"}" > data/meta.json

          echo "Done fetching all data"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "Update player data [automated]"
            git push
          fi
